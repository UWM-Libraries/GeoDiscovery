# General configuration
logging:
  level: WARNING
  logfile: "log/opendataharvest.log"

paths:
  crosswalk: "lib/opendataharvest/src/opendataharvest/data/crosswalk.csv"
  ogm_path: "tmp/opengeometadata"
  defaultbbox: "lib/opendataharvest/src/opendataharvest/data/default_bbox.csv"

requirements:
  check_required:
    - dct_publisher_sm
    - dct_spatial_sm
    - gbl_mdVersion_s
    - dct_title_s
    - id
    - gbl_mdModified_dt
    - gbl_resourceClass_sm

deprecated_fields:
  remove_deprecated:
    - dc_type_s
    - layer_geom_type_s
    - dct_isPartOf_sm
    - uw_supplemental_s
    - uw_notice_s
    - uuid
    - stanford_rights_metadata_s
    - stanford_use_and_reproduction_s
    - stanford_copyright_s

wisco_providers:
  - UW-Madison Robinson Map Library
  - WisconsinView
  - UW Digital Collections Center
  - Wisconsin State Cartographer's Office

string2array_suffixes:
  - sm
  - im

# DCAT Harvester specific configuration
CONFIG:
  CATALOG: "DCAT_Sites" # TestSites, DCAT_Sites, or CKAN_Sites
  OUTPUTDIR: "opendataharvest"
  COLLECTION_RECORD: "lib/opendataharvest/src/opendataharvest/data/agsl-opendata-harvest.json"
  DEFAULTBBOX: "lib/opendataharvest/src/opendataharvest/data/default_bbox.csv"
  MAXRETRY: 3
  SLEEPTIME: 2
  SCHEMA: "https://raw.githubusercontent.com/UWM-Libraries/GeoDiscovery/main/schema/geoblacklight-schema-aardvark.json"

################
# Localization #
################
DEFAULT:
  MEMBEROF:
    - "agsl-opendata-harvest"
  RESOURCECLASS:
    - "Datasets"
  ACCESSRIGHTS: "Public"
  MDVERSION: "Aardvark"
  LANG:
    - "English"
  PROVIDER: "American Geographical Society Library – UWM Libraries"
  SUPPRESSED: false
  RIGHTS:
    - Although this data is being distributed by the American Geographical Society Library at the University of Wisconsin-Milwaukee Libraries, no warranty expressed or implied is made by the University as to the accuracy of the data and related materials. The act of distribution shall not constitute any such warranty, and no responsibility is assumed by the University in the use of this data, or related materials.
  RESOURCETYPE:
    - "Digital maps"
  FORMAT: None
  DESCRIPTION: This dataset was automatically cataloged from the creator's Open Data Portal. In some cases, publication year and bounding coordinates shown here may be incorrect. Additional download formats may be available on the author's website. Please check the Resource Link for additional information.
  DISPLAYNOTE: 'Info: This dataset was automatically cataloged from the creator''s Open Data Portal. See the Resource Link to view the original resource.'

